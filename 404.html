<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found · Dhruv Shah</title>
  <link rel="icon" href="/assests/images/favicon-ds.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100svh;display:grid;place-items:center;text-align:center;
      background:#0a0c0f;color:#e8ebee;font-family:"JetBrains Mono",monospace;padding:2rem;
      background-image:radial-gradient(900px 500px at 50% -10%, rgba(110,231,183,.14), transparent 60%);}
    .code{font-family:"Space Grotesk",sans-serif;font-weight:700;
      font-size:clamp(5rem,22vw,11rem);line-height:1;letter-spacing:-.04em;
      background:linear-gradient(120deg,#e8ebee 30%,#6ee7b7);-webkit-background-clip:text;
      background-clip:text;-webkit-text-fill-color:transparent;}
    .term{color:#6ee7b7;font-size:.9rem;margin-top:.5rem;}
    .term .dim{color:#687078;}
    p.msg{color:#9aa4af;margin:1.2rem 0 2rem;font-size:.95rem;}
    a.home{display:inline-flex;align-items:center;gap:.5rem;font-weight:500;
      background:#6ee7b7;color:#04130c;padding:.8rem 1.4rem;border-radius:10px;
      text-decoration:none;transition:transform .2s,box-shadow .2s;}
    a.home:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(110,231,183,.2);}
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <div class="term"><span class="dim">$</span> cat page.html <span class="dim">→</span> no such file or directory</div>
    <p class="msg">This route doesn't exist, but plenty of working systems do.</p>
    <a class="home" href="/">← back to dhruv.shah()</a>
  </main>
</body>
</html>
